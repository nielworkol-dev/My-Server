<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Explorer OS - Perfect System Edition</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0ff 100%); 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            user-select: none;
        }
        .pc-window { 
            background: #ffffff; width: 95%; max-width: 1100px; height: 88vh; border-radius: 12px; border: 3px solid #ffb6c1;
            box-shadow: 0 15px 40px rgba(255, 182, 193, 0.5); display: flex; flex-direction: column; overflow: hidden;
        }
        .title-bar { 
            background: #ffb6c1; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; font-size: 14px;
        }
        .win-buttons div { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        
        .toolbar { background: #fff0f3; padding: 10px 15px; border-bottom: 2px solid #ffb6c1; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .nav-controls { display: flex; align-items: center; gap: 5px; flex: 1; }
        .btn-back { background: #ff69b4; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-back:disabled { background: #ccc; cursor: not-allowed; }
        .address-box { background: white; border: 1px solid #ffb6c1; padding: 6px 12px; border-radius: 6px; flex: 1; font-size: 13px; color: #ff69b4; font-weight: bold; }
        
        .search-box { padding: 6px 12px; border: 1px solid #ffb6c1; border-radius: 6px; width: 180px; font-size: 12px; outline: none; }
        .view-controls select { padding: 5px; border: 1px solid #ffb6c1; border-radius: 6px; font-size: 12px; color: #555; background: white; outline: none; cursor: pointer; }

        .main-content { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        .sidebar { width: 190px; background: #fff5f7; border-right: 2px solid #ffb6c1; padding: 15px; font-size: 13px; color: #555; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar-title { font-weight: bold; color: #ff69b4; margin-bottom: 10px; padding-left: 8px;}
        .nav-item { padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; transition: 0.2s;}
        .nav-item:hover { background: #ffe6eb; }
        .sidebar .active { background: #ffb6c1; color: white; font-weight: bold; }
        .storage-info { border-top: 1px solid #ffb6c1; padding-top: 10px; font-size: 11px; color: #777; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 6px; overflow: hidden; margin-top: 5px; }
        .progress-fill { background: #ff69b4; height: 100%; width: 5%; }
        
        .file-grid { flex: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; overflow-y: auto; background: #ffffff; }
        .file-grid.list-mode { flex-direction: column; gap: 5px; }
        
        .item-box { width: 95px; text-align: center; font-size: 12px; color: #333; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; word-break: break-all; display: flex; flex-direction: column; align-items: center; position: relative; }
        .item-box:hover { background: #ffe6eb; transform: scale(1.03); }
        .item-icon { font-size: 44px; margin-bottom: 5px; display: block; }
        
        .list-mode .item-box { width: auto; flex-direction: row; justify-content: space-between; padding: 8px 15px; text-align: left; }
        .list-mode .item-box .item-icon { font-size: 20px; margin-bottom: 0; margin-right: 10px; display: inline; }
        .list-mode .meta-info { display: inline; font-size: 11px; color: #888; margin-left: auto; padding-right: 20px; }
        .grid-mode .meta-info { display: none; }
        
        .context-menu { position: absolute; background: white; border: 1px solid #ffb6c1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 8px; width: 150px; display: none; z-index: 1000; font-size: 13px; overflow: hidden; }
        .context-menu div { padding: 10px 15px; cursor: pointer; color: #333; }
        .context-menu div:hover { background: #fff0f3; color: #ff69b4; font-weight: bold; }
        
        .upload-panel { padding: 15px 20px; background: #fff5f7; border-top: 2px solid #ffb6c1; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-action { background: #ff69b4; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-action:hover { background: #ff1493; }
        .btn-folder { background: #4da6ff; }
        .btn-folder:hover { background: #007bff; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="pc-window">
    <div class="title-bar">
        <span>📁 Windows Explorer OS - Perfect System Edition</span>
        <div class="win-buttons"><div style="background: #ffbd44;"></div><div style="background: #ff605c;"></div></div>
    </div>
    
    <div class="toolbar">
        <div class="nav-controls">
            <button class="btn-back" id="back-btn" disabled onclick="goBack()">⬅ Back</button>
            <div class="address-box">💻 PC &gt; <span id="drive-text">Local Disk (D:)</span><span id="path-text"></span></div>
        </div>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Cari berkas di sini..." oninput="filterItems()">
        <div class="view-controls">
            <select id="sort-select" onchange="filterItems()">
                <option value="name">Urutkan: Nama</option>
                <option value="size">Urutkan: Ukuran</option>
            </select>
            <select id="view-select" onchange="toggleViewMode()">
                <option value="grid-mode">Tampilan: Grid</option>
                <option value="list-mode">Tampilan: List</option>
            </select>
        </div>
    </div>
    
    <div class="main-content">
        <div class="sidebar">
            <div>
                <div class="sidebar-title">Akses Cepat</div>
                <div class="nav-item" id="nav-Desktop" onclick="changeDrive('Desktop')">🖥️ Desktop</div>
                <div class="nav-item" id="nav-Downloads" onclick="changeDrive('Downloads')">📥 Downloads</div>
                <div class="nav-item active" id="nav-LocalDiskD" onclick="changeDrive('Local Disk (D:)')">💾 Local Disk (D:)</div>
            </div>
            <div class="storage-info">
                <span>Penyimpanan Sistem Cloud</span>
                <div class="progress-bar"><div class="progress-fill" id="storage-bar"></div></div>
                <div style="margin-top: 4px;" id="storage-text">0 KB / 5.0 MB digunakan</div>
            </div>
        </div>
        
        <!-- Grid Ruang Kerja Utama -->
        <div class="file-grid grid-mode" id="explorer-grid"></div>
    </div>
    
    <div class="upload-panel">
        <span id="status-text" style="font-size: 13px; color: #ff69b4; font-weight: bold;">Siap.</span>
        <div style="display: flex; gap: 10px;">
            <!-- Perbaikan: Fungsi diikat langsung ke tombol fisik HTML -->
            <button class="btn-action btn-folder" onclick="createNewFolder()">📁 Tambah Folder</button>
            <label class="btn-action">
                <input type="file" id="file-uploader" onchange="handleFileSelect(this)" multiple>
                ➕ Simpan File Ke Sini
            </label>
        </div>
    </div>
</div>

<div class="context-menu" id="custom-menu">
    <div onclick="triggerRename()">✏️ Ubah Nama</div>
    <div onclick="triggerDetails()">ℹ️ Detail File</div>
    <div style="color: #ff4d4d;" onclick="triggerDelete()">🗑️ Hapus Data</div>
</div>

<script>
    let currentDrive = "Local Disk (D:)";
    let currentPath = ""; 
    let selectedItemId = null;

    const explorerGrid = document.getElementById('explorer-grid');
    const statusText = document.getElementById('status-text');
    const pathText = document.getElementById('path-text');
    const driveText = document.getElementById('drive-text');
    const backBtn = document.getElementById('back-btn');
    const customMenu = document.getElementById('custom-menu');

    // MENGGUNAKAN SIMPANAN LOCALSTORAGE STABIL AGAR TIDAK TERBLOKIR IZIN BROWSER
    function getStoredItems() {
        return JSON.parse(localStorage.getItem('ActiveWindowsOS_Items')) || [
            { id: "Local Disk (D:)__testing", name: "testing", type: "dir", drive: "Local Disk (D:)", path: "", date: new Date().toLocaleString(), size: "-" }
        ];
    }

    function saveStoredItems(items) {
        localStorage.setItem('ActiveWindowsOS_Items', JSON.stringify(items));
    }

    function loadDirectory() {
        explorerGrid.innerHTML = "";
        driveText.textContent = currentDrive;
        pathText.textContent = currentPath ? " > " + currentPath.replace(/\/$/, "").replace(/\//g, " > ") : "";
        backBtn.disabled = currentPath === "";

        filterItems();
    }

    function filterItems() {
        explorerGrid.innerHTML = "";
        const items = getStoredItems();
        const searchWord = document.getElementById('search-input').value.toLowerCase();
        
        let visibleItems = items.filter(item => 
            item.drive === currentDrive && 
            item.path === currentPath &&
            item.name.toLowerCase().includes(searchWord)
        );

        // Sorting
        const sortType = document.getElementById('sort-select').value;
        if (sortType === "name") visibleItems.sort((a, b) => a.name.localeCompare(b.name));
