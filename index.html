<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komputer Gemoy - Local Disk (D:)</title>
    <style>
        body { 
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0ff 100%); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }
        .pc-window { 
            background: #ffffff; width: 90%; max-width: 800px; height: 80vh;
            border-radius: 16px; border: 3px solid #ffb6c1;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            display: flex; flex-direction: column; overflow: hidden;
        }
        /* Bagian Atas Windows (Title Bar) */
        .title-bar { 
            background: #ffb6c1; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold; font-size: 14px;
        }
        .win-buttons div {
            width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 5px;
        }
        /* Jalur Alamat / Address Bar */
        .address-bar {
            background: #fff0f3; padding: 8px 15px; border-bottom: 2px solid #ffb6c1;
            font-size: 13px; color: #ff69b4; font-weight: bold; display: flex; align-items: center;
        }
        /* Isi Dokumen / File Manager Area */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .sidebar { 
            width: 180px; background: #fff5f7; border-right: 2px solid #ffb6c1; 
            padding: 15px; font-size: 13px; color: #555;
        }
        .sidebar div { padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px;}
        .sidebar .active { background: #ffb6c1; color: white; font-weight: bold; }
        
        .file-grid { flex: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; overflow-y: auto; }
        
        /* Desain Ikon File & Folder */
        .item-box { 
            width: 80px; text-align: center; font-size: 12px; color: #333; 
            cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s;
            word-break: break-all;
        }
        .item-box:hover { background: #ffe6eb; transform: scale(1.05); }
        .item-icon { font-size: 40px; margin-bottom: 5px; display: block; }
        
        /* Tombol Upload Mengambang */
        .upload-panel {
            padding: 15px 20px; background: #fff5f7; border-top: 2px solid #ffb6c1;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-upload {
            background: #ff69b4; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-upload:hover { background: #ff1493; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="pc-window">
    <!-- Atas Windows -->
    <div class="title-bar">
        <span>📁 Local Disk (D:) - Pengelola File Gemoy</span>
        <div class="win-buttons">
            <div style="background: #ffbd44;"></div>
            <div style="background: #ff605c;"></div>
        </div>
    </div>
    
    <!-- Alamat Folder -->
    <div class="address-bar">
        💻 Ini Komputer PC &gt; Local Disk (D:) &gt; 📝 Folder_Simpan_Dokumen
    </div>
    
    <!-- Area Utama Explorer -->
    <div class="main-content">
        <!-- Sidebar kiri -->
        <div class="sidebar">
            <div style="font-weight: bold; color: #ff69b4;">Akses Cepat</div>
            <div>🖥️ Desktop</div>
            <div>📥 Downloads</div>
            <div class="active">💾 Local Disk (D:)</div>
        </div>
        
        <!-- Grid Tempat File Muncul -->
        <div class="file-grid" id="explorer-grid">
            <!-- Folder bawaan agar terlihat seperti D: asli -->
            <div class="item-box">
                <span class="item-icon">📂</span>
                <span>Foto_Lucu</span>
            </div>
            <div class="item-box">
                <span class="item-icon">📂</span>
                <span>Tugas_Sekolah</span>
            </div>
            <!-- File dinamis akan masuk ke sini melalui javascript -->
        </div>
    </div>
    
    <!-- Panel Bawah Untuk Masukkan File Baru -->
    <div class="upload-panel">
        <span style="font-size: 13px; color: #ff69b4; font-weight: bold;">Simpan file baru ke Drive D:</span>
        <label class="btn-upload">
            <input type="file" id="file-uploader">
            ➕ Pilih & Simpan File
        </label>
    </div>
</div>

<script>
    const fileUploader = document.getElementById('file-uploader');
    const explorerGrid = document.getElementById('explorer-grid');

    // Fungsi menampilkan file yang tersimpan di memori browser
    function loadSavedFiles() {
        const files = JSON.parse(localStorage.getItem('my_drive_d_files')) || [];
        files.forEach(file => {
            createFileIcon(file.name, file.type);
        });
    }

    // Fungsi membuat visual ikon dokumen/foto
    function createFileIcon(name, type) {
        const itemBox = document.createElement('div');
        itemBox.className = 'item-box';
        
        // Tentukan ikon berdasarkan tipe file (Foto atau Dokumen)
        let icon = '📄';
        if (type.startsWith('image/')) icon = '🖼️';
        else if (type.includes('pdf')) icon = '📕';
        
        itemBox.innerHTML = `<span class="item-icon">${icon}</span><span>${name}</span>`;
        explorerGrid.appendChild(itemBox);
    }

    // Aksi saat user memilih file untuk disimpan
    fileUploader.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const uploadedFile = this.files[0];
            
            // Simpan data nama dan tipe file ke memori browser (Local Storage)
            const files = JSON.parse(localStorage.getItem('my_drive_d_files')) || [];
            files.push({ name: uploadedFile.name, type: uploadedFile.type });
            localStorage.setItem('my_drive_d_files', JSON.stringify(files));
            
            // Langsung tampilkan di layar
            createFileIcon(uploadedFile.name, uploadedFile.type);
            alert('🎉 Sukses! File "' + uploadedFile.name + '" berhasil disimpan ke dalam Local Disk (D:)');
        }
    });

    // Jalankan pemuatan file otomatis saat halaman dibuka
    loadSavedFiles();
</script>

</body>
</html>
