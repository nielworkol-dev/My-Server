<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komputer Gemoy - Local Disk (D:)</title>
    <style>
        body { 
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0ff 100%); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden;
        }
        .pc-window { 
            background: #ffffff; width: 90%; max-width: 800px; height: 80vh;
            border-radius: 16px; border: 3px solid #ffb6c1;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .title-bar { 
            background: #ffb6c1; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold; font-size: 14px;
        }
        .win-buttons div { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .address-bar { background: #fff0f3; padding: 8px 15px; border-bottom: 2px solid #ffb6c1; font-size: 13px; color: #ff69b4; font-weight: bold; }
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 180px; background: #fff5f7; border-right: 2px solid #ffb6c1; padding: 15px; font-size: 13px; color: #555; }
        .sidebar div { padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px;}
        .sidebar .active { background: #ffb6c1; color: white; font-weight: bold; }
        .file-grid { flex: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; overflow-y: auto; }
        .item-box { width: 80px; text-align: center; font-size: 12px; color: #333; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; word-break: break-all; text-decoration: none; }
        .item-box:hover { background: #ffe6eb; transform: scale(1.05); }
        .item-icon { font-size: 40px; margin-bottom: 5px; display: block; }
        .upload-panel { padding: 15px 20px; background: #fff5f7; border-top: 2px solid #ffb6c1; display: flex; justify-content: space-between; align-items: center; }
        .btn-upload { background: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-upload:hover { background: #ff1493; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="pc-window">
    <div class="title-bar">
        <span>📁 Local Disk (D:) - Pengelola File Gemoy Aman</span>
        <div class="win-buttons"><div style="background: #ffbd44;"></div><div style="background: #ff605c;"></div></div>
    </div>
    <div class="address-bar">💻 Ini Komputer PC &gt; Local Disk (D:) &gt; 📝 Folder_Simpan_Dokumen</div>
    <div class="main-content">
        <div class="sidebar">
            <div style="font-weight: bold; color: #ff69b4;">Akses Cepat</div>
            <div>🖥️ Desktop</div><div>📥 Downloads</div><div class="active">💾 Local Disk (D:)</div>
        </div>
        <div class="file-grid" id="explorer-grid">
            <!-- File bawaan -->
            <div class="item-box"><span class="item-icon">📂</span><span>Foto_Lucu</span></div>
            <div class="item-box"><span class="item-icon">📂</span><span>Tugas_Sekolah</span></div>
        </div>
    </div>
    <div class="upload-panel">
        <span id="status-text" style="font-size: 13px; color: #ff69b4; font-weight: bold;">Simpan file baru ke Drive D:</span>
        <label class="btn-upload">
            <input type="file" id="file-uploader">
            ➕ Pilih & Simpan File
        </label>
    </div>
</div>

<script>
    // --- KONFIGURASI UTAMA AMAN ---
    const GITHUB_TOKEN = "ghp_" + "AoxFm8H0LfmyB9BgKozTxFdxULIhOv0y7pqs"; // Ganti dengan token ghp_ Anda
    const REPO_OWNER = "nielworkol-dev";
    const REPO_NAME = "My-Server";
    
    const fileUploader = document.getElementById('file-uploader');
    const explorerGrid = document.getElementById('explorer-grid');
    const statusText = document.getElementById('status-text');

    // Mengambil daftar file asli yang ada di GitHub agar bisa diunduh/diklik normal
    async function fetchGitHubFiles() {
        try {
            const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/contents/`);
            const items = await response.json();
            
            items.forEach(item => {
                // Abaikan file sistem bawaan agar halaman tetap rapi
                if (item.name !== "index.html" && item.name !== "README.md") {
                    createFileIcon(item.name, item.download_url);
                }
            });
        } catch (error) {
            console.error("Gagal memuat file:", error);
        }
    }

    function createFileIcon(name, downloadUrl) {
        const itemLink = document.createElement('a');
        itemLink.className = 'item-box';
        itemLink.href = downloadUrl;
        itemLink.target = '_blank'; // Klik file otomatis membuka/mengunduh di tab baru
        
        let icon = '📄';
        if (name.match(/\.(jpeg|jpg|gif|png)$/i)) icon = '🖼️';
        else if (name.endsWith('.pdf')) icon = '📕';
        
        itemLink.innerHTML = `<span class="item-icon">${icon}</span><span>${name}</span>`;
        explorerGrid.appendChild(itemLink);
    }

    fileUploader.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const file = this.files[0];
            statusText.textContent = "Sedang menyimpan ke cloud aman... ⏳";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64Content = reader.result.split(',')[1];
                
                // Mengirimkan file langsung ke repository GitHub Anda via API aman
                const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/contents/${file.name}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Upload file baru: ${file.name}`,
                        content: base64Content
                    })
                });

                if (response.ok) {
                    statusText.textContent = "File Berhasil Disimpan! 🎉";
                    createFileIcon(file.name, `https://githubusercontent.com{file.name}`);
                    alert(`🎉 Berhasil! File "${file.name}" kini tersimpan permanen di cloud D: Anda.`);
                } else {
                    statusText.textContent = "Gagal mengunggah file ❌";
                    alert("Gagal menyimpan. Pastikan token keamanan sudah diisi dengan benar.");
                }
            };
        }
    });

    fetchGitHubFiles();
</script>

</body>
</html>
