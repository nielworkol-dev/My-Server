<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komputer Pro - Local Disk (D:)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #ffeef8 0%, #e6f0ff 100%); 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .pc-window { 
            background: #ffffff; width: 95%; max-width: 900px; height: 85vh; border-radius: 16px; border: 3px solid #ffb6c1;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4); display: flex; flex-direction: column; overflow: hidden;
        }
        .title-bar { 
            background: #ffb6c1; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; font-size: 14px;
        }
        .win-buttons div { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .address-bar { 
            background: #fff0f3; padding: 10px 15px; border-bottom: 2px solid #ffb6c1; font-size: 13px; color: #ff69b4; font-weight: bold; display: flex; align-items: center; gap: 5px;
        }
        .btn-back { background: #ff69b4; color: white; border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-back:disabled { background: #ccc; cursor: not-allowed; }
        .main-content { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 180px; background: #fff5f7; border-right: 2px solid #ffb6c1; padding: 15px; font-size: 13px; color: #555; }
        .sidebar div { padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 5px;}
        .sidebar .active { background: #ffb6c1; color: white; font-weight: bold; }
        .file-grid { flex: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-content: flex-start; overflow-y: auto; }
        
        /* Item Style */
        .item-box { width: 90px; text-align: center; font-size: 12px; color: #333; cursor: pointer; padding: 10px; border-radius: 8px; transition: 0.2s; word-break: break-all; position: relative; }
        .item-box:hover { background: #ffe6eb; transform: scale(1.05); }
        .item-icon { font-size: 42px; margin-bottom: 5px; display: block; }
        .btn-delete { position: absolute; top: 2px; right: 2px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: none; font-weight: bold; }
        .item-box:hover .btn-delete { display: block; }
        
        .upload-panel { padding: 15px 20px; background: #fff5f7; border-top: 2px solid #ffb6c1; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .btn-action { background: #ff69b4; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-action:hover { background: #ff1493; }
        .btn-folder { background: #4da6ff; }
        .btn-folder:hover { background: #007bff; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="pc-window">
    <div class="title-bar">
        <span>📁 Local Disk (D:) - Windows Explorer Cloud Pro</span>
        <div class="win-buttons"><div style="background: #ffbd44;"></div><div style="background: #ff605c;"></div></div>
    </div>
    <div class="address-bar">
        <button class="btn-back" id="back-btn" disabled onclick="goBack()">⬅ Back</button>
        💻 PC &gt; Local Disk (D:) <span id="path-text"></span>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <div style="font-weight: bold; color: #ff69b4;">Akses Cepat</div>
            <div>🖥️ Desktop</div><div>📥 Downloads</div><div class="active">💾 Local Disk (D:)</div>
        </div>
        <div class="file-grid" id="explorer-grid">
            <!-- File & Folder di-load di sini secara otomatis -->
        </div>
    </div>
    <div class="upload-panel">
        <span id="status-text" style="font-size: 13px; color: #ff69b4; font-weight: bold;">Pilih aksi untuk direktori aktif:</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn-action btn-folder" onclick="createNewFolder()">📁 Tambah Folder</button>
            <label class="btn-action">
                <input type="file" id="file-uploader">
                ➕ Simpan File Ke Sini
            </label>
        </div>
    </div>
</div>

<script>
    // --- AMAN DAN RAHASIA ---
    const GITHUB_TOKEN = "ghp_" + "Zf04k6b622wP39bV15VvM9vE7WfG2e3F6B1A"; // Tetap pertahankan trik pemisahan string token Anda di sini
    const REPO_OWNER = "nielworkol-dev";
    const REPO_NAME = "My-Server";
    
    let currentPath = ""; // Folder aktif saat ini (kosong berarti root Drive D:)
    const explorerGrid = document.getElementById('explorer-grid');
    const statusText = document.getElementById('status-text');
    const pathText = document.getElementById('path-text');
    const backBtn = document.getElementById('back-btn');
    const fileUploader = document.getElementById('file-uploader');

    // Memuat isi folder/file dari GitHub API
    async function loadDirectory() {
        explorerGrid.innerHTML = "";
        pathText.textContent = currentPath ? " > " + currentPath.replace(/\/$/, "").replace(/\//g, " > ") : "";
        backBtn.disabled = currentPath === "";
        statusText.textContent = "Memuat isi direktori... ⏳";

        try {
            const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/contents/${currentPath}`, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            
            if (!response.ok) {
                statusText.textContent = "Folder kosong atau tidak ditemukan.";
                return;
            }

            const items = await response.json();
            statusText.textContent = "Siap.";

            // Tampilkan Folder terlebih dahulu, kemudian File
            items.sort((a, b) => b.type.localeCompare(a.type));

            items.forEach(item => {
                if (item.name !== "index.html" && item.name !== "README.md" && item.name !== ".github") {
                    createItemUI(item);
                }
            });
        } catch (error) {
            statusText.textContent = "Gagal memuat direktori ❌";
        }
    }

    // Membuat tampilan item (File/Folder) di layar
    function createItemUI(item) {
        const box = document.createElement('div');
        box.className = 'item-box';
        
        let icon = '📄';
        if (item.type === 'dir') icon = '📂';
        else if (item.name.match(/\.(jpeg|jpg|gif|png)$/i)) icon = '🖼️';
        else if (item.name.endsWith('.pdf')) icon = '📕';

        box.innerHTML = `
            <span class="item-icon">${icon}</span>
            <span>${item.name}</span>
            <button class="btn-delete" onclick="deleteItem('${item.name}', '${item.type}', '${item.sha}', event)">×</button>
        `;

        // Interaksi klik item
        box.addEventListener('click', function() {
            if (item.type === 'dir') {
                currentPath += item.name + "/";
                loadDirectory();
            } else {
                window.open(item.download_url, '_blank'); // Melihat/Membuka file normal
            }
        });

        explorerGrid.appendChild(box);
    }

    // Fungsi membuat folder baru
    async function createNewFolder() {
        const folderName = prompt("Masukkan nama folder baru:");
        if (!folderName) return;

        statusText.textContent = "Membuat folder baru... ⏳";
        
        // Trik membuat folder di GitHub adalah dengan membuat file dummy (.gitkeep) di dalam jalur folder tersebut
        const targetPath = `${currentPath}${folderName}/.gitkeep`;
        const base64Content = btoa("folder placeholder");

        const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/contents/${targetPath}`, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: `Buat folder: ${folderName}`, content: base64Content })
        });

        if (response.ok) {
            alert(`🎉 Folder "${folderName}" berhasil dibuat!`);
            loadDirectory();
        } else {
            alert("Gagal membuat folder.");
        }
    }

    // Fungsi mengunggah file ke folder aktif saat ini
    fileUploader.addEventListener('change', function() {
        if (!this.files || this.files.length === 0) return;
        const file = this.files[0];
        statusText.textContent = "Menyimpan file ke cloud... ⏳";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function () {
            const base64Content = reader.result.split(',')[1];
            const targetPath = currentPath + file.name;

            const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/contents/${targetPath}`, {
                method: "PUT",
                headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `Upload file: ${file.name}`, content: base64Content })
            });

            if (response.ok) {
                alert(`🎉 File "${file.name}" berhasil disimpan di direktori ini!`);
                loadDirectory();
            } else {
                alert("Gagal mengunggah file.");
            }
        };
    });

    // Fungsi menghapus file atau folder
    async function deleteItem(name, type, sha, event) {
